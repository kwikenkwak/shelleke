<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 3/4 bird's-eye castle, Carcassonne-illustration style: a battlemented
       curtain wall seen at a slight angle with round corner towers wearing
       conical roofs, and a tall central keep. Black outlines on white fills so
       walls and roofs read as drawn buildings, not a flat footprint. -->
  <g fill="#fff" stroke="#000" stroke-width="2.4" stroke-linejoin="round">
    <!-- back wall with battlement teeth -->
    <path d="M22 46 v-6 h5 v6 h6 v-6 h5 v6 h6 v-6 h5 v6 h6 v-6 h5 v6 h6 v-6 h5 v6 h6 v-6 h5 v6
             v4 h-66 Z"/>
    <!-- front wall face -->
    <path d="M22 50 h66 v14 h-66 Z"/>
    <!-- gate (dark) -->
    <path d="M48 64 v-9 a4.5 4.5 0 0 1 9 0 v9 Z" fill="#000"/>

    <!-- left tower body -->
    <path d="M14 42 h16 v24 h-16 Z"/>
    <!-- left conical roof -->
    <path d="M12 42 L22 22 L32 42 Z"/>
    <!-- right tower body -->
    <path d="M70 42 h16 v24 h-16 Z"/>
    <!-- right conical roof -->
    <path d="M68 42 L78 22 L88 42 Z"/>

    <!-- central keep body -->
    <path d="M42 40 h16 v16 h-16 Z"/>
    <!-- keep battlements -->
    <path d="M42 40 v-4 h4 v4 h4 v-4 h4 v4 h4 v-4 h4 v4 Z"/>
    <!-- keep conical roof -->
    <path d="M40 36 L50 14 L60 36 Z"/>
  </g>
  <!-- pennant on the keep -->
  <line x1="50" y1="14" x2="50" y2="5" stroke="#000" stroke-width="1.6"/>
  <path d="M50 5 l9 3 l-9 3 Z" fill="#000"/>
  <!-- roof slat shading for detail -->
  <g stroke="#000" stroke-width="1" fill="none">
    <line x1="22" y1="22" x2="17" y2="40"/>
    <line x1="22" y1="22" x2="27" y2="40"/>
    <line x1="78" y1="22" x2="73" y2="40"/>
    <line x1="78" y1="22" x2="83" y2="40"/>
    <line x1="50" y1="14" x2="44" y2="34"/>
    <line x1="50" y1="14" x2="56" y2="34"/>
    <!-- arrow slits on front wall -->
    <line x1="34" y1="54" x2="34" y2="60"/>
    <line x1="66" y1="54" x2="66" y2="60"/>
  </g>
</svg>
