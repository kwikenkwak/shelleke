<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 3/4 bird's-eye walled town: a battlemented town wall with a gate tower
       across the front, packed pitched-roof houses rising behind it, and a
       church/cathedral spire over the rooftops. Illustrative, not a footprint. -->
  <g fill="#fff" stroke="#000" stroke-width="2" stroke-linejoin="round">
    <!-- packed rooftops behind the wall -->
    <path d="M18 52 h16 v8 h-16 Z"/>
    <path d="M16 52 L26 40 L36 52 Z"/>
    <path d="M40 50 h14 v10 h-14 Z"/>
    <path d="M38 50 L47 39 L56 50 Z"/>
    <path d="M70 52 h14 v8 h-14 Z"/>
    <path d="M68 52 L77 41 L86 52 Z"/>

    <!-- central church: tall nave + spire over the town -->
    <path d="M55 40 h12 v18 h-12 Z"/>
    <path d="M53 40 L61 22 L69 40 Z"/>          <!-- steep spire roof -->

    <!-- town wall with battlements across the front -->
    <path d="M10 60 v-4 h4 v4 h4 v-4 h4 v4 h4 v-4 h4 v4 h4 v-4 h4 v4 h4 v-4 h4 v4
             h4 v-4 h4 v4 h4 v-4 h4 v4 h4 v-4 h4 v4 h4 v-4 h4 v4 h4 v-4 h4 v4
             v18 h-80 Z"/>
    <!-- gate tower -->
    <path d="M42 78 v-22 h16 v22 Z"/>
    <path d="M42 56 v-4 h4 v4 h4 v-4 h4 v4 h4 v-4 h4 v4 Z"/>
    <path d="M46 78 v-12 a4 4 0 0 1 8 0 v12 Z" fill="#000"/>   <!-- gate -->
  </g>
  <!-- spire cross + detail -->
  <line x1="61" y1="22" x2="61" y2="14" stroke="#000" stroke-width="1.4"/>
  <line x1="57" y1="18" x2="65" y2="18" stroke="#000" stroke-width="1.4"/>
  <g stroke="#000" stroke-width="0.9" fill="none">
    <line x1="61" y1="22" x2="56" y2="38"/>
    <line x1="61" y1="22" x2="66" y2="38"/>
    <!-- wall arrow slits -->
    <line x1="20" y1="64" x2="20" y2="70"/>
    <line x1="78" y1="64" x2="78" y2="70"/>
  </g>
</svg>
