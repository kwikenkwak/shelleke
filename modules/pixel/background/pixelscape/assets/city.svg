<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Carcassonne walled city: a crenellated outer wall enclosing a
       dense block of built-up rooftops (top-down). -->
  <!-- crenellated wall ring -->
  <path fill="none" stroke="#000" stroke-width="5" stroke-linejoin="miter"
        d="M10 18 h8 v-6 h8 v6 h8 v-6 h8 v6 h8 v-6 h8 v6 h8 v-6 h8 v6 h8
           v8 h6 v8 h-6 v8 h6 v8 h-6 v8 h6 v8 h-6 v8
           h-8 v6 h-8 v-6 h-8 v6 h-8 v-6 h-8 v6 h-8 v-6 h-8 v6 h-8 v-6 h-8
           v-8 h-6 v-8 h6 v-8 h-6 v-8 h6 v-8 h-6 v-8 h6 Z"/>
  <!-- inner rooftops -->
  <g fill="#000">
    <rect x="26" y="28" width="14" height="14"/>
    <rect x="44" y="26" width="12" height="12"/>
    <rect x="60" y="30" width="14" height="14"/>
    <rect x="28" y="48" width="12" height="12"/>
    <rect x="46" y="44" width="16" height="16"/>
    <rect x="62" y="50" width="12" height="12"/>
    <rect x="30" y="64" width="14" height="10"/>
    <rect x="50" y="64" width="20" height="10"/>
  </g>
</svg>
