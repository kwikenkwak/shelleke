<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 3/4 bird's-eye village: a little cluster of pitched-roof houses seen at
       a slight angle, so you read each gable end, roof slope and wall. Black
       outline on white, with ridge + eaves lines and tiny doors for detail. -->
  <g fill="#fff" stroke="#000" stroke-width="2" stroke-linejoin="round">
    <!-- house A (front-left, larger) -->
    <path d="M16 56 h22 v14 h-22 Z"/>            <!-- wall -->
    <path d="M14 56 L27 40 L40 56 Z"/>           <!-- gable roof -->
    <path d="M21 70 h6 v-7 h-6 Z" fill="#000"/>  <!-- door -->

    <!-- house B (back-right) -->
    <path d="M52 46 h20 v12 h-20 Z"/>
    <path d="M50 46 L62 32 L74 46 Z"/>
    <path d="M59 58 h6 v-6 h-6 Z" fill="#000"/>

    <!-- house C (small, front-right) -->
    <path d="M62 64 h16 v12 h-16 Z"/>
    <path d="M60 64 L70 52 L80 64 Z"/>

    <!-- house D (small, back-left) -->
    <path d="M30 38 h14 v10 h-14 Z"/>
    <path d="M28 38 L37 27 L46 38 Z"/>
  </g>
  <!-- roof slope shading -->
  <g stroke="#000" stroke-width="0.9" fill="none">
    <line x1="27" y1="40" x2="22" y2="52"/>
    <line x1="27" y1="40" x2="32" y2="52"/>
    <line x1="62" y1="32" x2="57" y2="43"/>
    <line x1="62" y1="32" x2="67" y2="43"/>
    <line x1="70" y1="52" x2="66" y2="61"/>
    <line x1="70" y1="52" x2="74" y2="61"/>
    <line x1="37" y1="27" x2="33" y2="35"/>
    <line x1="37" y1="27" x2="41" y2="35"/>
  </g>
</svg>
