<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 3/4 bird's-eye mountains: overlapping peaks seen from a slight angle,
       with shaded (hatched) flanks and snowy white caps. -->
  <g fill="#fff" stroke="#000" stroke-width="2.4" stroke-linejoin="round">
    <!-- back peak -->
    <path d="M30 78 L52 22 L74 78 Z"/>
    <!-- left peak -->
    <path d="M8 84 L26 40 L46 84 Z"/>
    <!-- right peak -->
    <path d="M54 84 L72 46 L92 84 Z"/>
  </g>
  <!-- snow caps (white wedges with outline) -->
  <g fill="#fff" stroke="#000" stroke-width="1.4" stroke-linejoin="round">
    <path d="M44 44 L52 22 L60 44 L53 38 L48 42 Z"/>
    <path d="M19 60 L26 40 L33 60 L27 54 L23 57 Z"/>
    <path d="M64 62 L72 46 L80 62 L73 56 L69 59 Z"/>
  </g>
  <!-- flank hatching for shading -->
  <g stroke="#000" stroke-width="0.9" fill="none">
    <line x1="52" y1="50" x2="46" y2="66"/>
    <line x1="55" y1="52" x2="50" y2="66"/>
    <line x1="26" y1="62" x2="20" y2="76"/>
    <line x1="29" y1="64" x2="24" y2="76"/>
    <line x1="72" y1="64" x2="66" y2="78"/>
    <line x1="75" y1="66" x2="70" y2="78"/>
  </g>
</svg>
