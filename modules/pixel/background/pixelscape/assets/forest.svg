<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 3/4 bird's-eye forest: a cluster of rounded broadleaf trees seen from a
       slight angle, each with a visible trunk and a shaded crown, overlapping
       into a little wood. White fill, black outline. -->
  <g fill="#fff" stroke="#000" stroke-width="2" stroke-linejoin="round">
    <!-- trunks -->
    <rect x="26" y="58" width="4" height="14"/>
    <rect x="56" y="52" width="4" height="16"/>
    <rect x="42" y="66" width="4" height="14"/>
    <rect x="72" y="62" width="4" height="14"/>
    <!-- crowns (drawn back-to-front so fronts overlap) -->
    <circle cx="58" cy="40" r="15"/>
    <circle cx="28" cy="48" r="16"/>
    <circle cx="74" cy="52" r="13"/>
    <circle cx="44" cy="56" r="17"/>
  </g>
  <!-- crown shading: a few short curved hatch strokes per tree -->
  <g stroke="#000" stroke-width="0.9" fill="none">
    <path d="M50 50 q4 6 10 6"/>
    <path d="M22 52 q4 6 10 6"/>
    <path d="M68 54 q4 5 9 5"/>
    <path d="M38 60 q5 6 11 6"/>
  </g>
</svg>
