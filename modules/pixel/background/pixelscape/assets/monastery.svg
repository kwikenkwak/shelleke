<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 3/4 bird's-eye monastery: a chapel with a pitched roof and a little bell
       tower topped by a cross, with a low cloister wing beside it. -->
  <g fill="#fff" stroke="#000" stroke-width="2.2" stroke-linejoin="round">
    <!-- chapel nave -->
    <path d="M34 50 h28 v22 h-28 Z"/>
    <!-- chapel pitched roof -->
    <path d="M31 50 L48 32 L65 50 Z"/>
    <!-- bell tower at the front -->
    <path d="M58 72 v-30 h12 v30 Z"/>
    <path d="M56 42 L64 28 L72 42 Z"/>          <!-- tower spire -->
    <!-- low cloister wing -->
    <path d="M22 60 h14 v12 h-14 Z"/>
    <path d="M20 60 L29 51 L38 60 Z"/>
    <!-- arched chapel door -->
    <path d="M44 72 v-9 a4 4 0 0 1 8 0 v9 Z" fill="#000"/>
  </g>
  <!-- cross above the bell tower -->
  <line x1="64" y1="28" x2="64" y2="18" stroke="#000" stroke-width="1.8"/>
  <line x1="59" y1="23" x2="69" y2="23" stroke="#000" stroke-width="1.8"/>
  <!-- roof shading + round window -->
  <g stroke="#000" stroke-width="0.9" fill="none">
    <line x1="48" y1="32" x2="42" y2="46"/>
    <line x1="48" y1="32" x2="54" y2="46"/>
    <circle cx="48" cy="60" r="3.5"/>
  </g>
</svg>
